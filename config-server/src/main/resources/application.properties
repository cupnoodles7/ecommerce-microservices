spring.application.name=config-server
server.port = 8889
#spring.profiles.active=native
#spring.cloud.config.server.native.search-locations=file:/Users/akriti.khetan/microservices/config-files
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

#for git
spring.cloud.config.server.git.uri=https://github.com/cupnoodles7/eureka-config-files.git

#for private repo
spring.cloud.config.server.git.username=${CONFIG_GIT_USERNAME}

#git PAT
spring.cloud.config.server.git.password=${CONFIG_GIT_PASSWORD}