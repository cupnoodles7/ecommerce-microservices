server:
  port: 8085

spring:
  application:
    name: AUTH-SERVICE
  profiles:
    active: dev
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8889}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/authdb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  tracing:
    enabled: true # Enabling distributed tracing
    sampling:
      probability: 1.0 # All requests sent by Postman will be traced
    propagation:
      type: b3 # B3 propagation format used by Zipkin

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans} # Zipkin endpoint

  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans, prometheus
      base-path: /actuator

  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: Auth Service
    version: 1.0.0
    description: Authentication Service

logging:
  level:
    com.tnf.auth_service: DEBUG
    org.springframework.cloud.sleuth: DEBUG

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ThisIsMyTnfAuthServiceSecretKeyChangeMe12345}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds